<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Grid Example</title>

    <!-- Bootstrap CSS -->
    <link href="http3.0/dist/css/bootstrap.mis://cdn.jsdelivr.net/npm/bootstrap@5.n.css" rel="stylesheet">

    <style>
        body{
            background-color: #f8f9fa;
        }

        h1{
            margin: 20px 0;
        }

        .container,
        .container-fluid,
        .col-md-3{
            border: 2px solid black;
        }

        .col-md-3{
            text-align: center;
            font-weight: bold;
            color: white;
        }
    </style>
</head>

<body>

    <!-- Heading -->
    <h1 class="text-primary text-center">
        Bootstrap Grid System
    </h1>

    <!-- Fixed Container -->
    <div class="container bg-light p-3 mb-4">
        <h3 class="text-dark">Fixed Width Container</h3>
    </div>

    <!-- Full Width Container -->
    <div class="container-fluid bg-dark text-white p-3 mb-4">
        <h3>Full Width Container</h3>
    </div>

    <!-- Grid Layout -->
    <div class="container">

        <div class="row g-3">

            <div class="col-md-3 bg-primary p-4">Column 1</div>
            <div class="col-md-3 bg-success p-4">Column 2</div>
            <div class="col-md-3 bg-danger p-4">Column 3</div>
            <div class="col-md-3 bg-warning p-4 text-dark">Column 4</div>

            <div class="col-md-3 bg-info p-4">Column 5</div>
            <div class="col-md-3 bg-secondary p-4">Column 6</div>
            <div class="col-md-3 bg-dark p-4">Column 7</div>
            <div class="col-md-3 bg-primary p-4">Column 8</div>

            <div class="col-md-3 bg-success p-4">Column 9</div>
            <div class="col-md-3 bg-danger p-4">Column 10</div>
            <div class="col-md-3 bg-warning p-4 text-dark">Column 11</div>
            <div class="col-md-3 bg-info p-4">Column 12</div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
